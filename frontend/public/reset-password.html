<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password | AssembleMonitor</title>
  <link rel="stylesheet" href="css/styles.css">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
</head>
<body>

  <div class="auth-page">
    <div class="auth-brand">
      <div class="auth-brand-content">
        <img src="assets/logo.png" alt="AssembleMonitor">
        <h2>Create New Password</h2>
        <p>Choose a strong password to protect your construction management workspace and keep your data secure.</p>
      </div>
    </div>

    <div class="auth-form-side">
      <div class="auth-form-wrapper">
        <a href="index.html" class="auth-form-logo">
          <img src="assets/logo.png" alt="AssembleMonitor">
          <span>Assemble<em>Monitor</em></span>
        </a>

        <h1>Reset Password</h1>
        <p class="subtitle">Enter and confirm your new password below.</p>

        <form id="resetForm">
          <div class="form-group">
            <label for="newPassword">New Password</label>
            <input type="password" class="form-control" id="newPassword" placeholder="Minimum 8 characters" required>
          </div>
          <div class="form-group">
            <label for="confirmPassword">Confirm Password</label>
            <input type="password" class="form-control" id="confirmPassword" placeholder="Re-enter your password" required>
          </div>
          <button type="submit" class="btn btn-primary btn-block btn-lg" style="margin-top:8px">
            <span class="material-symbols-outlined">lock_reset</span>
            Reset Password
          </button>
        </form>

        <div class="form-footer">
          <a href="login.html">← Back to Sign In</a>
        </div>
      </div>
    </div>
  </div>

  <script src="js/app.js"></script>
</body>
</html>
