<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Edit Phase | AssembleMonitor</title>
  <link rel="stylesheet" href="/css/styles.css">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
</head>
<body>
  <div class="dashboard">
    <aside class="sidebar">
      <div class="sidebar-header">
        <img src="/assets/logo.png" alt="AssembleMonitor">
        <span class="sidebar-brand">Assemble<span>Monitor</span></span>
      </div>
      <div class="sidebar-section-label">Main</div>
      <nav class="sidebar-nav">
        <a href="/pm/index.html"><span class="material-symbols-outlined">dashboard</span> PM Dashboard</a>
        <div class="sidebar-section-label" style="padding-left:0">Planning</div>
        <a href="/pm/manage-phases.html" class="active"><span class="material-symbols-outlined">account_tree</span> Manage Phases</a>
        <a href="/pm/manage-tasks.html"><span class="material-symbols-outlined">assignment</span> Manage Tasks</a>
        <div class="divider"></div>
        <a href="#" class="logout-btn"><span class="material-symbols-outlined">logout</span> Logout</a>
      </nav>
    </aside>
    <div class="main-content">
      <header class="topbar">
        <div class="topbar-left">
          <div>
            <div class="topbar-title">Edit Phase</div>
            <div class="topbar-breadcrumb">PM > Manage Phases > <span>Edit Phase</span></div>
          </div>
        </div>
      </header>
      <div class="dash-content">
        <div class="panel animate-in">
          <div class="panel-header"><span class="panel-title">Update Phase Information</span></div>
          <div class="panel-body">
            <form id="editPhasePageForm">
              <input type="hidden" id="editPhaseId">
              <div class="form-group" style="margin-bottom:20px">
                <label>Phase Name</label>
                <input type="text" id="editPhaseName" class="form-control" required>
              </div>
              <div style="display:grid; grid-template-columns:1fr 1fr; gap:20px; margin-bottom:20px">
                <div class="form-group">
                  <label>Start Date</label>
                  <input type="date" id="editPhaseStart" class="form-control" required>
                </div>
                <div class="form-group">
                  <label>End Date</label>
                  <input type="date" id="editPhaseEnd" class="form-control" required>
                </div>
              </div>
              <div class="form-group" style="margin-bottom:20px">
                <label>Status</label>
                <select id="editPhaseStatus" class="form-select">
                  <option value="planning">Planning</option>
                  <option value="active">Active</option>
                  <option value="completed">Completed</option>
                  <option value="on_hold">On Hold</option>
                  <option value="delayed">Delayed</option>
                </select>
              </div>
              <div class="form-group" style="margin-bottom:20px">
                <label>Description</label>
                <textarea id="editPhaseDesc" class="form-control" rows="3"></textarea>
              </div>
              <div style="display:flex; gap:12px; margin-top:32px;">
                <button type="button" id="deletePhasePageBtn" class="btn btn-outline" style="color:var(--danger); border-color:var(--danger); margin-right: auto;">Delete Phase</button>
                <a href="/pm/manage-phases.html" class="btn btn-outline">Cancel</a>
                <button type="submit" class="btn btn-primary">Save Changes</button>
              </div>
            </form>
          </div>
        </div>
      </div>
    </div>
  </div>
  <script src="../js/app.js"></script>
</body>
</html>
