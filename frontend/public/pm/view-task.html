<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>View Task | AssembleMonitor</title>
  <link rel="stylesheet" href="/css/styles.css">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
</head>
<body>
  <div class="dashboard">
    <aside class="sidebar">
      <div class="sidebar-header">
        <img src="/assets/logo.png" alt="AssembleMonitor">
        <span class="sidebar-brand">Assemble<span>Monitor</span></span>
      </div>
      <nav class="sidebar-nav">
        <a href="/pm/index.html"><span class="material-symbols-outlined">dashboard</span> PM Dashboard</a>
        <div class="sidebar-section-label" style="padding-left:0">Planning</div>
        <a href="/pm/manage-phases.html"><span class="material-symbols-outlined">account_tree</span> Manage Phases</a>
        <a href="/pm/manage-tasks.html" class="active"><span class="material-symbols-outlined">assignment</span> Manage Tasks</a>
        <div class="divider"></div>
        <a href="#" class="logout-btn"><span class="material-symbols-outlined">logout</span> Logout</a>
      </nav>
    </aside>
    <div class="main-content">
      <header class="topbar">
        <div class="topbar-left">
          <div>
            <div class="topbar-title">Task Details</div>
            <div class="topbar-breadcrumb">PM > Manage Tasks > <span>View Task</span></div>
          </div>
        </div>
      </header>
      <div class="dash-content">
        <div id="viewTaskPageContent">
          <div style="text-align:center; padding:50px;">Loading task details...</div>
        </div>
      </div>
    </div>
  </div>
  <script src="../js/app.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      if (!requireAuth(['admin', 'project_manager'])) return;

      const container = document.getElementById('viewTaskPageContent');
      const taskId = new URLSearchParams(window.location.search).get('id');

      if (!taskId) {
        container.innerHTML = '<div style="text-align:center;padding:50px;color:var(--text-muted)">No task ID provided.</div>';
        return;
      }

      try {
        const task = await apiFetch(`/v1/tasks/${taskId}`);
        container.innerHTML = `
          <div class="panel animate-in">
            <div class="panel-header">
              <span class="panel-title">${escapeHtml(task.name)}</span>
              <span class="panel-action">
                <a href="edit-task.html?id=${task.id}" class="btn btn-outline" style="padding:4px 16px;font-size:0.85rem;">Edit Task</a>
              </span>
            </div>
            <div class="panel-body">
              <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px;">
                <div><strong style="color:var(--text-muted);font-size:0.85rem;">Phase</strong><div>${escapeHtml(task.phase_name || '-')}</div></div>
                <div><strong style="color:var(--text-muted);font-size:0.85rem;">Assigned To</strong><div>${escapeHtml(task.assignee_name || 'Unassigned')}</div></div>
                <div><strong style="color:var(--text-muted);font-size:0.85rem;">Status</strong><div><span class="status-badge ${getTaskStatusBadgeClass(task.status)}">${normalizeTaskStatus(task.status)}</span></div></div>
                <div><strong style="color:var(--text-muted);font-size:0.85rem;">Priority</strong><div><span class="status-badge ${getPriorityBadgeClass(task.priority)}">${escapeHtml(task.priority)}</span></div></div>
                <div><strong style="color:var(--text-muted);font-size:0.85rem;">Start Date</strong><div>${formatShortDate(task.start_date) || '-'}</div></div>
                <div><strong style="color:var(--text-muted);font-size:0.85rem;">Due Date</strong><div>${formatShortDate(task.due_date) || '-'}</div></div>
              </div>
              ${task.description ? `
              <div style="margin-top:24px;padding-top:16px;border-top:1px solid var(--border);">
                <strong style="color:var(--text-muted);font-size:0.85rem;">Description</strong>
                <div style="margin-top:6px;white-space:pre-wrap;line-height:1.6;">${escapeHtml(task.description)}</div>
              </div>` : ''}
            </div>
          </div>`;
      } catch (err) {
        console.error(err);
        container.innerHTML = '<div style="text-align:center;padding:50px;color:var(--danger)">Failed to load task details.</div>';
      }
    });
  </script>
</body>
</html>
