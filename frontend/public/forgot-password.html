<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forgot Password | AssembleMonitor</title>
  <link rel="stylesheet" href="css/styles.css">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
</head>
<body>

  <div class="auth-page">
    <div class="auth-brand">
      <div class="auth-brand-content">
        <img src="assets/logo.png" alt="AssembleMonitor">
        <h2>Account Recovery</h2>
        <p>Don't worry — it happens to the best of us. We'll help you get back to managing your construction projects in no time.</p>
      </div>
    </div>

    <div class="auth-form-side">
      <div class="auth-form-wrapper">
        <a href="index.html" class="auth-form-logo">
          <img src="assets/logo.png" alt="AssembleMonitor">
          <span>Assemble<em>Monitor</em></span>
        </a>

        <h1>Forgot Password?</h1>
        <p class="subtitle">Enter your registered email and we'll send you a reset link.</p>

        <form id="forgotForm">
          <div class="form-group">
            <label for="email">Email Address</label>
            <input type="email" class="form-control" id="email" placeholder="you@company.com" required>
          </div>
          <button type="submit" class="btn btn-primary btn-block btn-lg" style="margin-top:8px">
            <span class="material-symbols-outlined">mail</span>
            Send Reset Link
          </button>
        </form>

        <div class="form-footer">
          Remember your password? <a href="login.html">Sign In</a><br><br>
          <a href="index.html">← Back to Home</a>
        </div>
      </div>
    </div>
  </div>

  <script src="js/app.js"></script>
</body>
</html>
